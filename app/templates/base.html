<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}My Flask App{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link 
      rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
    <div class="container-fluid d-flex align-items-center">

      <!-- Brand left -->
      <a class="navbar-brand fw-bold fs-1" href="#">Groove Journal</a>

      <!-- Toggler for mobile -->
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Centered Links -->
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/albums/1">My Albums</a></li>
          <li class="nav-item"><a class="nav-link" href="/diary/1">My Diary</a></li>
        </ul>
      </div>

    </div>
  </nav>
<main class="flex-grow-1 container-fluid p-0">
      <div class="container-fluid p-0 pb-6">{% block content %}{% endblock %}</div>
    </main>

    <footer class="bg-dark text-light py-4">
      <div class="container text-center text-md-start">
        <div class="row">

          <div class="col-md-8 mb-3">
            <h5 class="text-uppercase fw-bold mb-3">Groove Journal</h5>
            <p class="small">
              A record collection that's not just a collection of records.
            </p>
          </div>


          <div class="col-md-4 mb-3">
            <h6 class="text-uppercase fw-bold mb-3">Follow Us</h6>
            <a href="#" class="text-light me-3"><i class="bi bi-facebook"></i></a>
            <a href="#" class="text-light me-3"><i class="bi bi-twitter"></i></a>
            <a href="#" class="text-light me-3"><i class="bi bi-instagram"></i></a>
            <a href="#" class="text-light"><i class="bi bi-github"></i></a>
          </div>
        </div>

        <hr class="my-1 border-light" />

        <div class="text-center small">
          © 2025 Groove Journal — All Rights Reserved
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>

</html>
